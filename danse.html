<h1>La Danse</h1>

<p>La danse est un art qui me permet d’exprimer mes émotions à travers mes mouvements. Je pratique la danse depuis mes 6ans et j'ai fait tout types de danse: Classique, Modern Jazz, Hip Hop...</p>
